name: mztrackertodo
description: A new Flutter project.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.5
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  avatar_glow: ^3.0.1
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.3
  curved_navigation_bar: ^1.0.3

  # Storage
  get_storage: ^2.1.1
  path_provider: ^2.1.5

  # File handling
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  intl: ^0.19.0

  # Loading / feedback
  flutter_easyloading: ^3.0.5

dependency_overrides:
  path_provider_android: ">=2.2.0 <2.3.0"
  get: ^4.7.3

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/lottie/
